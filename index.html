<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atrada Assembly Builder</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Ink / structure */
  --navy:#16233c; --grey-text:#5b6572; --grey-border:#dde1e6; --grey-bg:#f2f3f5; --white:#fff;
  /* Blueprint accent */
  --blue:#1f5fa8; --blue-light:#e9f0f9;
  /* Status / category accents (muted, technical-legend palette) */
  --green:#1f9d63; --orange:#c17817; --red:#c62f45; --purple:#6d4e9c; --teal:#0f8a83;
  --sheetmetal:#3f7cb0; --weldment:#c17817; --fastener:#6d4e9c; --label:#1f9d63; --other:#6b7280;
  /* Master BOM print palette */
  --pb-blue:#1a56db; --pb-blue-light:#d3e2fb; --pb-green:#1f8a4c; --pb-green-mid:#2fa363; --pb-green-light:#cdeed9; --pb-black:#171717;
  --radius:10px;
  --font-sans:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--font-sans);background:var(--grey-bg);color:var(--navy);}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:var(--blue);}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
@media (prefers-reduced-motion: reduce){ *{animation-duration:.001ms !important; transition-duration:.001ms !important;} }

/* ---------- Login ---------- */
#loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--grey-bg);}
.login-box{background:#fff;padding:36px 34px;border-radius:14px;box-shadow:0 24px 60px -18px rgba(15,22,36,.25),0 0 0 1px rgba(15,22,36,.04);width:340px;}
.login-box h1{font-size:19px;margin:0 0 4px;font-weight:600;letter-spacing:-.01em;}
.login-box p{color:var(--grey-text);font-size:13px;margin:0 0 22px;}
.login-box input{width:100%;padding:10px 0;margin-bottom:14px;border:none;border-bottom:1.5px solid var(--grey-border);border-radius:0;font-size:14px;font-family:var(--font-mono);}
.login-box input:focus{outline:none;border-bottom-color:var(--blue);}
.login-box button{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:600;margin-top:4px;}
.login-box button:hover{background:#194b87;}
.login-error{color:var(--red);font-size:13px;margin-bottom:10px;}

/* ---------- Top bar ---------- */
#topbar{display:flex;align-items:center;justify-content:space-between;background:var(--navy);border-bottom:1px solid var(--navy);padding:12px 22px;position:sticky;top:0;z-index:50;}
#topbar .brand{font-weight:600;font-size:15.5px;display:flex;align-items:center;gap:9px;color:#fff;letter-spacing:-.01em;}
#topbar .brand .dot{width:9px;height:9px;border-radius:50%;background:#5b9bd9;}
#topbar .right{display:flex;align-items:center;gap:14px;font-size:12.5px;color:#aeb8c9;font-family:var(--font-mono);}
#topbar button.iconbtn{background:none;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:7px 12px;font-size:12.5px;color:#fff;}
#topbar button.iconbtn:hover{background:rgba(255,255,255,.08);}

/* ---------- Board ---------- */
#board{padding:24px;max-width:1500px;margin:0 auto;}
.board-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.board-header h2{margin:0;font-size:20px;font-weight:600;letter-spacing:-.01em;}
.btn-primary{background:var(--blue);color:#fff;border:none;padding:9px 16px;border-radius:7px;font-size:13.5px;font-weight:600;}
.btn-primary:hover{background:#194b87;}
.btn-secondary{background:#fff;color:var(--navy);border:1px solid var(--grey-border);padding:9px 16px;border-radius:7px;font-size:13.5px;font-weight:600;}
.btn-secondary:hover{background:var(--grey-bg);}

table.board-table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);overflow:hidden;border:1px solid var(--grey-border);box-shadow:0 1px 3px rgba(15,22,36,.04);}
table.board-table thead th{text-align:left;font-size:10.5px;color:var(--grey-text);font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:11px 14px;border-bottom:1px solid var(--grey-border);background:var(--grey-bg);}
table.board-table tbody tr{border-bottom:1px solid #eef0f2;cursor:pointer;transition:background .1s;}
table.board-table tbody tr:last-child{border-bottom:none;}
table.board-table tbody tr:hover{background:var(--blue-light);}
table.board-table td{padding:12px 14px;font-size:13.5px;vertical-align:middle;}
td.assembly-num{font-weight:600;color:var(--blue);font-family:var(--font-mono);}
td.assembly-name{color:var(--navy);}
.status-pill{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;}
.status-draft{background:#8a92a0;}
.status-in_progress{background:var(--orange);}
.status-ifc{background:var(--green);}
.status-on_hold{background:var(--red);}
.status-superseded{background:#6b7280;}
.empty-state{text-align:center;padding:60px 20px;color:var(--grey-text);}
.empty-state h3{color:var(--navy);}

/* ---------- Drawer (centered document card, title-block header) ---------- */
#overlay{position:fixed;inset:0;background:rgba(15,22,36,.5);backdrop-filter:blur(2px);z-index:100;display:none;
  opacity:0;transition:opacity .16s ease;}
#overlay.open{display:block;opacity:1;}
#drawer{position:fixed;top:50%;left:50%;transform:translate(-50%,-48%) scale(.98);height:88vh;width:min(1120px,94vw);
  background:var(--white);z-index:101;border-radius:14px;
  box-shadow:0 30px 70px -18px rgba(15,22,36,.4),0 0 0 1px rgba(15,22,36,.05);
  display:none;flex-direction:column;overflow:hidden;opacity:0;
  transition:opacity .16s ease,transform .16s ease;}
#drawer.open{display:flex;opacity:1;transform:translate(-50%,-50%) scale(1);}

.drawer-header{padding:22px 28px 0;border-bottom:1px solid var(--grey-border);background:var(--white);}
.drawer-header .row1{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:16px;}
.drawer-eyebrow{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--blue);text-transform:uppercase;margin:0 0 4px;}
.drawer-header h2{margin:0 0 3px;font-size:21px;font-weight:600;letter-spacing:-.01em;}
.drawer-header .sub{color:var(--grey-text);font-size:13px;}
.drawer-close{background:none;border:1px solid var(--grey-border);width:30px;height:30px;border-radius:8px;font-size:18px;color:var(--grey-text);line-height:1;flex-shrink:0;}
.drawer-close:hover{background:var(--grey-bg);color:var(--navy);}
.drawer-header-actions{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.drawer-header-actions .small-btn{white-space:nowrap;}

/* ---------- Print Master BOM ---------- */
#printView{display:none;}
@media print{
  body *{visibility:hidden;}
  #printView, #printView *{visibility:visible;}
  #printView{display:block;position:absolute;top:0;left:0;width:100%;margin:0;padding:0;}
  @page{size:A3 landscape;margin:10mm 12mm;}
}
.print-sheet{font-family:var(--font-sans);font-size:9.5px;color:#161616;}
.print-band{color:#fff;font-weight:700;text-transform:uppercase;letter-spacing:.02em;padding:8px 12px;break-after:avoid;break-inside:avoid;}
.print-band.pb-title{background:var(--pb-blue);font-size:21px;padding:13px 14px;letter-spacing:0;margin-bottom:0;}
.print-band.pb-green{background:var(--pb-green);font-size:10.5px;margin-top:12px;}
.print-band.pb-blue-cat{background:var(--pb-blue);font-size:10.5px;margin-top:12px;}
.print-subband{padding:4.5px 12px;font-size:9.5px;font-weight:700;text-transform:uppercase;break-after:avoid;break-inside:avoid;}
.print-subband-green{background:var(--pb-green-light);color:#111;}
.print-subband-blue{background:var(--pb-blue-light);color:#111;}
.print-subband-blue.nested{padding-left:30px;font-weight:600;opacity:.9;}
.print-subband-blue.italic{font-style:italic;text-transform:none;font-weight:600;}

table.print-titleblock-table{width:100%;border-collapse:collapse;margin-bottom:0;font-size:10.5px;}
table.print-titleblock-table td{border:1px solid #c7cdd6;padding:5px 12px;}
table.print-titleblock-table td.pb-lbl{font-weight:700;width:11%;}
table.print-titleblock-table td.pb-val{width:39%;font-family:var(--font-mono);}
table.print-titleblock-table tr:nth-child(odd) td{background:#fff;}
table.print-titleblock-table tr:nth-child(even) td{background:#f2f3f5;}

table.print-bom-table{width:100%;border-collapse:collapse;font-size:9.5px;margin-bottom:0;}
table.print-bom-table th{text-align:left;background:var(--pb-blue);color:#fff;font-size:9px;text-transform:uppercase;letter-spacing:.02em;padding:5px 8px;border:1px solid #6a90d6;}
table.print-bom-table td{padding:3.5px 8px;border:1px solid #ddd;vertical-align:top;}
table.print-bom-table tbody tr:nth-child(even) td{background:#f4f5f7;}
table.print-bom-table tr.print-profile-row td{background:var(--pb-green-light);font-weight:700;text-transform:uppercase;}
table.print-bom-table tr.print-subgroup-row td{background:var(--pb-green-light);font-weight:700;text-transform:uppercase;}
table.print-bom-table tr.print-subtotal-row td{background:var(--pb-green-mid);color:#fff;font-weight:700;}
table.print-bom-table tr.print-grandtotal-row td{background:var(--pb-blue);color:#fff;font-weight:700;}

table.print-cut-table{width:100%;border-collapse:collapse;font-size:9.5px;margin-bottom:0;}
table.print-cut-table th{text-align:left;background:var(--pb-black);color:#fff;font-size:9px;text-transform:uppercase;letter-spacing:.02em;padding:5px 8px;border:1px solid #444;}
table.print-cut-table td{padding:3.5px 8px;border:1px solid #ddd;}
table.print-cut-table tbody tr:nth-child(even) td{background:#f4f5f7;}

.print-notes{font-size:9px;color:#333;margin-top:7px;line-height:1.6;}
.print-footer{margin-top:16px;padding-top:7px;border-top:1px solid #c7cdd6;font-size:9px;color:#555;display:flex;justify-content:space-between;}

/* Title-block meta strip: bordered cells, small-caps labels, mono values */
.meta-grid{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--grey-border);border-radius:8px;overflow:hidden;margin-bottom:18px;background:var(--grey-bg);}
.meta-field{padding:9px 14px;border-left:1px solid var(--grey-border);background:var(--white);}
.meta-field:first-child{border-left:none;}
.meta-field:nth-child(4n+1){border-left:none;}
.meta-field label{display:block;font-size:10px;color:var(--grey-text);text-transform:uppercase;font-weight:600;letter-spacing:.06em;margin-bottom:4px;}
.meta-field select, .meta-field input{width:100%;padding:2px 0;border:none;border-bottom:1px solid transparent;background:none;font-size:13.5px;font-family:var(--font-mono);color:var(--navy);border-radius:0;}
.meta-field select:hover, .meta-field input:hover{border-bottom-color:var(--grey-border);}
.meta-field select:focus, .meta-field input:focus{outline:none;border-bottom-color:var(--blue);}

.tabs{display:flex;gap:22px;padding:0 28px;border-bottom:1px solid var(--grey-border);background:var(--white);}
.tab{padding:11px 2px;font-size:12.5px;font-weight:600;color:var(--grey-text);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;margin-bottom:-1px;}
.tab:hover{color:var(--navy);}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.drawer-body{flex:1;overflow-y:auto;padding:20px 28px 40px;background:var(--white);}

/* ---------- BOM tree (technical legend strips + hairline data table) ---------- */
.category-band{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:5px;color:#fff;font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;margin:20px 0 0;
  font-family:var(--font-mono);}
.category-band:first-child{margin-top:0;}
.cat-sheetmetal{background:var(--sheetmetal);}
.cat-weldment{background:var(--weldment);}
.cat-fastener{background:var(--fastener);}
.cat-label{background:var(--label);}
.cat-other{background:var(--other);}

table.bom-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:4px;border:1px solid var(--grey-border);border-top:none;}
table.bom-table th{text-align:left;background:var(--grey-bg);color:var(--grey-text);font-weight:600;padding:7px 10px;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;position:sticky;top:0;border-bottom:1px solid var(--grey-border);}
table.bom-table td{padding:7px 10px;border-bottom:1px solid #eef0f2;vertical-align:top;}
table.bom-table td.mono{color:var(--grey-text);}
tr.group-row td{background:#f7f9fb;font-weight:600;color:var(--navy);border-top:1px solid var(--grey-border);}
tr.group-row .toggle{display:inline-block;width:14px;color:var(--grey-text);}
tr.item-row:hover{background:var(--blue-light);}
.indent{display:inline-block;}
.empty-bom{color:var(--grey-text);padding:20px;text-align:center;font-size:13px;}

/* ---------- Revisions / Attachments ---------- */
table.rev-table, table.att-table{width:100%;border-collapse:collapse;font-size:13px;}
table.rev-table th, table.att-table th{text-align:left;padding:8px;background:#fafbfc;color:var(--grey-text);font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--grey-border);}
table.rev-table td, table.att-table td{padding:8px;border-bottom:1px solid #f0f1f4;vertical-align:top;}
.rev-badge{display:inline-block;background:var(--blue-light);color:var(--blue);font-weight:600;padding:2px 8px;border-radius:5px;font-size:12px;font-family:var(--font-mono);}

.upload-zone{border:1.5px dashed var(--grey-border);border-radius:8px;padding:26px;text-align:center;color:var(--grey-text);font-size:13px;margin-bottom:16px;background:var(--grey-bg);transition:border-color .12s,background .12s;}
.upload-zone.dragover{border-color:var(--blue);background:var(--blue-light);}
.upload-zone input{display:none;}
.parse-badge{padding:2px 8px;border-radius:5px;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
.parse-pending{background:#f5e9c8;color:#8a6d00;}
.parse-parsed{background:#dcf1e6;color:#0f7a45;}
.parse-failed{background:#f7dde1;color:#a3283d;}
.parse-manual{background:#e7e9ec;color:#5b6572;}

.small-btn{background:none;border:1px solid var(--grey-border);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--navy);font-weight:500;}
.small-btn:hover{background:var(--grey-bg);}
.linklike{background:none;border:none;color:var(--blue);font-size:13px;padding:0;}
.section-title{font-size:13.5px;font-weight:600;margin:0 0 12px;display:flex;justify-content:space-between;align-items:center;text-transform:uppercase;letter-spacing:.04em;color:var(--grey-text);}
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;z-index:200;box-shadow:0 8px 24px rgba(15,22,36,.25);}

/* New Assembly modal — matches the drawer's document-card language */
#modalOverlay{position:fixed;inset:0;background:rgba(15,22,36,.5);backdrop-filter:blur(2px);z-index:150;display:none;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s ease;}
#modalOverlay.open{display:flex;opacity:1;}
.modal-box{background:#fff;border-radius:14px;padding:26px 28px;width:440px;max-width:92vw;
  box-shadow:0 30px 70px -18px rgba(15,22,36,.4),0 0 0 1px rgba(15,22,36,.05);
  transform:scale(.98);transition:transform .15s ease;}
#modalOverlay.open .modal-box{transform:scale(1);}
.modal-box h3{margin:0 0 4px;font-size:17px;font-weight:600;}
.modal-box .modal-sub{color:var(--grey-text);font-size:12.5px;margin:0 0 6px;}
.modal-box label{display:block;font-size:10.5px;color:var(--grey-text);margin:14px 0 4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.modal-box input, .modal-box select{width:100%;padding:8px 0;border:none;border-bottom:1.5px solid var(--grey-border);border-radius:0;font-size:14px;font-family:var(--font-mono);background:none;color:var(--navy);}
.modal-box input:focus, .modal-box select:focus{outline:none;border-bottom-color:var(--blue);}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h1>Atrada Assembly Builder</h1>
    <p>Sign in to view the assembly board.</p>
    <div id="loginError" class="login-error" style="display:none;"></div>
    <input type="email" id="loginEmail" placeholder="Email" autocomplete="username">
    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
    <button id="loginBtn">Sign in</button>
  </div>
</div>

<div id="appShell" style="display:none;">
  <div id="topbar">
    <div class="brand"><span class="dot"></span> Atrada Assembly Builder</div>
    <div class="right">
      <span id="userEmail"></span>
      <button class="iconbtn" id="signOutBtn">Sign out</button>
    </div>
  </div>

  <div id="board">
    <div class="board-header">
      <h2>Assemblies</h2>
      <button class="btn-primary" id="newAssemblyBtn">+ New Assembly</button>
    </div>
    <div id="boardTableWrap"></div>
  </div>
</div>

<div id="overlay"></div>
<div id="drawer">
  <div class="drawer-header">
    <div class="row1">
      <div>
        <div class="drawer-eyebrow">Assembly Record</div>
        <h2 id="drawerTitle">-</h2>
        <div class="sub" id="drawerSub">-</div>
      </div>
      <div class="drawer-header-actions">
        <button class="small-btn" id="printBomBtn">&#128424; Print Master BOM</button>
        <button class="drawer-close" id="drawerCloseBtn">&times;</button>
      </div>
    </div>
    <div class="meta-grid">
      <div class="meta-field"><label>Status</label><select id="metaStatus"></select></div>
      <div class="meta-field"><label>SO #</label><input id="metaSoNumber"></div>
      <div class="meta-field"><label>Client</label><input id="metaClient"></div>
      <div class="meta-field"><label>Current Rev</label><input id="metaRev"></div>
      <div class="meta-field"><label>Tare Wt (kg)</label><input id="metaWeight"></div>
      <div class="meta-field"><label>Description</label><input id="metaDescription"></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="bom">BOM Tree</button>
    <button class="tab" data-tab="revisions">Revisions</button>
    <button class="tab" data-tab="attachments">Attachments</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<div id="modalOverlay">
  <div class="modal-box">
    <h3>New Assembly</h3>
    <div class="modal-sub">Create a new assembly record on the board.</div>
    <label>Assembly Number</label>
    <input id="newAsmNumber" placeholder="e.g. TMSB201">
    <label>Assembly Name</label>
    <input id="newAsmName" placeholder="e.g. Maintenance Shutdown Box">
    <label>Client</label>
    <input id="newAsmClient" placeholder="optional">
    <div class="modal-actions">
      <button class="btn-secondary" id="modalCancelBtn">Cancel</button>
      <button class="btn-primary" id="modalCreateBtn">Create</button>
    </div>
  </div>
</div>

<div id="printView"></div>

<script>
// =====================================================================
// CONFIG
// =====================================================================
const SUPABASE_URL = "https://fiptponjqtoysddrphmo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpcHRwb25qcXRveXNkZHJwaG1vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2OTQ3OTksImV4cCI6MjA5OTI3MDc5OX0.gZCyCX-NeVXMf8gqlve7NJ81QmtcspNYNTjjPfa01m4";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const CATEGORY_LABELS = {
  sheetmetal: "Sheetmetal", weldment: "Weldments",
  fastener: "Fasteners & Fittings", label: "Labels & Stickers", other: "Other"
};
const CATEGORY_ORDER = ["sheetmetal","weldment","fastener","label","other"];

// =====================================================================
// STATE
// =====================================================================
let currentUser = null;
let assemblies = [];
let selectedAssembly = null;
let bomNodes = [];
let revisions = [];
let attachments = [];
let activeTab = "bom";

// =====================================================================
// UTIL
// =====================================================================
function $(sel){ return document.querySelector(sel); }
function $all(sel){ return document.querySelectorAll(sel); }
function esc(s){
  if (s === null || s === undefined) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function toast(msg, isError){
  const t = document.createElement("div");
  t.className = "toast";
  if (isError) t.style.background = "#b3001f";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
function fmtNum(n){
  if (n === null || n === undefined || n === "") return "";
  const num = Number(n);
  if (Number.isNaN(num)) return esc(n);
  return num % 1 === 0 ? String(num) : String(num);
}

async function initAuth(){
  const { data: { session } } = await sb.auth.getSession();
  if (session && session.user){
    currentUser = session.user;
    showApp();
  } else {
    showLogin();
  }
  sb.auth.onAuthStateChange((event, session) => {
    if (event === "SIGNED_IN" && session && session.user){
      currentUser = session.user;
      showApp();
    } else if (event === "SIGNED_OUT"){
      currentUser = null;
      showLogin();
    }
  });
}

      <th style="width:8%">Mat'l</th><th style="width:9%">Length (mm)</th><th style="width:5%">Qty</th>

function renderNodeRow(node, byParent, depth){
  const children = byParent[node.id] || [];
  const hasChildren = children.length > 0;
  const collapsed = collapsedNodes.has(node.id);
  const indentPx = depth * 20;
  let row;
  if (node.node_type === "sub_assembly"){
    row = `<tr class="group-row" data-id="${node.id}">
      <td class="mono">${esc(node.item_no)||""}</td>
      <td><span class="indent" style="margin-left:${indentPx}px"></span>${hasChildren ? `<span class="toggle" data-id="${node.id}">${collapsed?"&#9656;":"&#9662;"}</span>` : `<span class="toggle"></span>`}${esc(node.part_number)}</td>
      <td colspan="6">${esc(node.description)||""}</td>
    </tr>`;
  } else {
    row = `<tr class="item-row" data-id="${node.id}">
      <td class="mono">${esc(node.item_no)||""}</td>
      <td><span class="indent" style="margin-left:${indentPx+14}px"></span>${esc(node.part_number)||""}</td>
      <td>${esc(node.description)||""}</td>
      <td>${esc(node.material)||""}</td>
      <td class="mono">${node.length_mm != null ? fmtNum(node.length_mm) : ""}</td>
      <td class="mono">${node.qty != null ? fmtNum(node.qty) : ""}</td>
      <td class="mono">${esc(node.netsuite_code)||""}</td>
      <td>${esc(node.remarks)||""}</td>
    </tr>`;
  }
  let out = row;
  if (hasChildren && !collapsed){
    children.forEach(c => { out += renderNodeRow(c, byParent, depth+1); });
  }
  return out;
}

function findAncestorSubAssembly(node, byId){
  let cur = node.parent_id ? byId[node.parent_id] : null;
  while (cur){
    if (cur.node_type === "sub_assembly") return cur;
    cur = cur.parent_id ? byId[cur.parent_id] : null;
  }
  return null;
}

function ancestorLabel(node, byId){
  const anc = findAncestorSubAssembly(node, byId);
  return anc ? (anc.part_number || "Sub-Assembly") : "Full Assembly";
}

// Sheetmetal: one row per physical part, Remarks column shows which sub-assembly it belongs to.
// Fasteners/Labels: dedupe by netsuite code (procurement doesn't care where each piece ends up),
// summing qty and combining the usage locations into the Remarks column.
function buildFlatOrderSummary(items, byId, dedupe){
  if (!dedupe){
    return items.map(n => ({ ...n, _remarks: ancestorLabel(n, byId) }));
  }
  const merged = {};
  const order = [];
  items.forEach(n => {
    const key = (n.netsuite_code || n.part_number || n.id || "").toString().toUpperCase() || n.id;
    const label = ancestorLabel(n, byId);
    const qty = n.qty != null ? n.qty : 1;
    if (!merged[key]){ merged[key] = { ...n, qty: 0, _usage: {} }; order.push(key); }
    merged[key].qty += qty;
    merged[key]._usage[label] = (merged[key]._usage[label] || 0) + qty;
  });
  return order.map(key => {
    const m = merged[key];
    m._remarks = Object.entries(m._usage).map(([label, q]) => `${label} ${fmtNum(q)}`).join(" + ");
    return m;
  });
}

// Groups items (already filtered to one category) by their nearest sub-assembly ancestor,
// falling back to a virtual "Full Assembly" bucket for root-level items with no such ancestor.
function buildCategoryBreakdown(items, byId){
  const groups = {};
  const order = [];
  items.forEach(n => {
    const anc = findAncestorSubAssembly(n, byId);
    const key = anc ? anc.id : "FULL_ASSEMBLY";
    const label = anc ? (anc.part_number || "Sub-Assembly") : "Full Assembly";
    if (!groups[key]){ groups[key] = { label, rows: [] }; order.push(key); }
    groups[key].rows.push(n);
  });
  return order.map(key => groups[key]);
}

// Groups weldment items by profile+material (e.g. "SHS 40 X 3" / PRE-GALV), sums length*qty,
// and computes 8m bars-to-order via ceiling division plus the resulting offcut.
function buildWeldmentOrderSummary(items){
  const groups = {};
  const order = [];
  items.forEach(n => {
    const profile = (n.description || "").trim() || "Unspecified Profile";
    const material = (n.material || "").trim() || "—";
    const key = profile + "||" + material;
    if (!groups[key]){ groups[key] = { profile, material, rows: [] }; order.push(key); }
    groups[key].rows.push({
      usage: n.part_number || "",
      length_mm: n.length_mm || 0,
      qty: n.qty != null ? n.qty : 1
    });
  });
  const profileGroups = order.map(key => {
    const g = groups[key];
    let totalQty = 0, totalLength = 0;
    g.rows.forEach(r => { totalQty += r.qty; totalLength += r.qty * r.length_mm; });
    const barsToOrder = totalLength > 0 ? Math.ceil(totalLength / 8000) : 0;
    const offcut = barsToOrder * 8000 - totalLength;
    return { profile: g.profile, material: g.material, rows: g.rows, totalQty, totalLength, barsToOrder, offcut };
  });
  const grandTotalBars = profileGroups.reduce((s,g) => s + g.barsToOrder, 0);
  return { profileGroups, grandTotalBars };
}

// First-fit-decreasing bin packing: sorts pieces longest-first and drops each into the first
// bar with enough remaining length, opening a new 8000mm bar only when none fit.
function packBars(pieceLengths, barLength){
  const sorted = [...pieceLengths].sort((a,b) => b - a);
  const bars = [];
  sorted.forEach(len => {
    let placed = false;
    for (const bar of bars){
      if (len <= bar.remaining + 0.001){ bar.cuts.push(len); bar.remaining -= len; placed = true; break; }
    }
    if (!placed) bars.push({ cuts: [len], remaining: barLength - len });
  });
  return bars.map(b => ({ cuts: b.cuts, used: barLength - b.remaining, waste: b.remaining }));
}

function formatCuts(cuts){
  const counts = {};
  cuts.forEach(c => { counts[c] = (counts[c]||0) + 1; });
  return Object.keys(counts).map(Number).sort((a,b) => b - a)
    .map(len => `${fmtNum(len)}x${counts[len]}`).join(" | ");
}

function renderBreakdownSection(cat, items, byId){
  if (!items.length) return "";
  let out = `<div class="print-band pb-blue-cat">${CATEGORY_LABELS[cat]}</div>`;
  const groups = buildCategoryBreakdown(items, byId);
  let n = 1;
  if (cat === "weldment"){
    // Second nesting level: within each sub-assembly, group by the weldment's own
    // part_number (e.g. "MAIN FRAME - REV.03"), matching the reference document's layout.
    groups.forEach(g => {
      out += `<div class="print-subband print-subband-blue">${esc(g.label)}</div>`;
      const byPart = {};
      const partOrder = [];
      g.rows.forEach(r => {
        const key = r.part_number || "—";
        if (!byPart[key]){ byPart[key] = []; partOrder.push(key); }
        byPart[key].push(r);
      });
      partOrder.forEach(key => {
        out += `<div class="print-subband print-subband-blue nested">${esc(key)}</div>`;
        out += `<table class="print-bom-table">${orderTableHead()}<tbody>`;
        byPart[key].forEach(r => {
          out += renderFlatOrderRows([{ ...r, _remarks: "" }], n);
          n++;
        });
        out += `</tbody></table>`;
      });
    });
  } else {
    groups.forEach(g => {
      out += `<div class="print-subband print-subband-blue">${esc(g.label)}</div>`;
      out += `<table class="print-bom-table">${orderTableHead()}<tbody>`;
      g.rows.forEach(r => {
        out += renderFlatOrderRows([{ ...r, _remarks: "" }], n);
        n++;
      });
      out += `</tbody></table>`;
    });
  }
  return out;
}

function renderPrintView(){
  const a = selectedAssembly;
  const byId = {};
  bomNodes.forEach(n => { byId[n.id] = n; });
  const itemsByCategory = {};
  CATEGORY_ORDER.forEach(cat => { itemsByCategory[cat] = []; });
  bomNodes.filter(n => n.node_type === "item").forEach(n => {
    // Category is a Master-BOM-generation-time concern: items ingested via
    // the Assembly Builder stage carry category=null (pure structure only),
    // so it gets classified here, at the moment the Master BOM is produced.
    const cat = n.category || classifyCategory(n) || "other";
    (itemsByCategory[cat] = itemsByCategory[cat] || []).push(n);
  });
  Object.values(itemsByCategory).forEach(list => list.sort((x,y) => (x.sort_order||0) - (y.sort_order||0)));

    weldSummary.profileGroups.forEach(g => {

      g.rows.forEach(r => {

        </tr>`;

      html += `<tr class="print-subtotal-row"><td colspan="3">SUBTOTAL - ${esc(g.profile)}</td>
        <td></td><td>${fmtNum(g.totalQty)}</td><td>${fmtNum(g.totalLength)}</td>
        <td>${g.barsToOrder}</td><td>ORDER ${g.barsToOrder} x 8M BAR(S)</td></tr>`;
    });
    html += `</tbody></table>`;

    html += `<div class="print-band pb-green">Order Summary - Total 8m Bars to Purchase</div>`;
    html += `<table class="print-bom-table"><thead><tr>
      <th style="width:4%">#</th><th style="width:20%">Profile</th><th style="width:12%">Material</th>
      <th style="width:9%">Total Pcs</th><th style="width:12%">Total Length (mm)</th><th style="width:9%">/ 8,000mm</th>
      <th style="width:10%">Bars to Order</th><th style="width:12%">Offcut (mm)</th><th style="width:12%">Order Note</th>
    </tr></thead><tbody>`;
    weldSummary.profileGroups.forEach((g, i) => {
      html += `<tr>

    html += `</tbody></table>`;
    html += `<div class="print-notes">
      NOTE 1: Bars to Order = CEILING(Total Length / 8,000mm) per profile.<br>

      NOTE 3: All bar lengths are in millimetres. Standard bar length = 8,000mm.<br>

    </div>`;

    // ---- Cutting plan ----
    html += `<div class="print-band pb-blue-cat">Cutting Plan</div>`;
    weldSummary.profileGroups.forEach(g => {
      if (!g.totalLength) return;
      const pieces = [];
      g.rows.forEach(r => { for (let i=0;i<r.qty;i++) pieces.push(r.length_mm); });
      const bars = packBars(pieces, 8000);
      html += `<div class="print-subband print-subband-blue italic">Cutting Plan - ${esc(g.profile)} (each 8,000mm bar)</div>`;
      html += `<table class="print-cut-table"><thead><tr>
        <th style="width:8%">Bar #</th><th style="width:62%">Cuts (length mm x qty)</th>
        <th style="width:15%">Used (mm)</th><th style="width:15%">Waste (mm)</th>
      </tr></thead><tbody>`;
      bars.forEach((b, i) => {
        html += `<tr><td>Bar ${i+1}</td><td>${formatCuts(b.cuts)}</td><td>${fmtNum(b.used)}</td><td>${fmtNum(b.waste)}</td></tr>`;
      });
      html += `</tbody></table>`;
    });
  }

  // ---- Fasteners + Labels combined order summary (procurement) ----
  const fastenerFlat = buildFlatOrderSummary(itemsByCategory.fastener || [], byId, true);
  const labelFlat = buildFlatOrderSummary(itemsByCategory.label || [], byId, true);
  if (fastenerFlat.length || labelFlat.length){
    html += `<div class="print-band pb-green">Order Summary - Remaining Groups (Fasteners &amp; Fittings + Labels &amp; Stickers)</div>`;
    html += `<table class="print-bom-table">${orderTableHead()}<tbody>`;
    if (fastenerFlat.length){
      html += `<tr class="print-subgroup-row"><td colspan="8">Fasteners &amp; Fittings</td></tr>`;
      html += renderFlatOrderRows(fastenerFlat, 1);
    }
    if (labelFlat.length){
      html += `<tr class="print-subgroup-row"><td colspan="8">Labels &amp; Stickers</td></tr>`;
      html += renderFlatOrderRows(labelFlat, 1);
    }
    html += `</tbody></table>`;
  }

  // ---- Breakdown sections (traceability: grouped by sub-assembly, touch of Atrada blue) ----
  CATEGORY_ORDER.forEach(cat => {
    if (cat === "other") return;
    html += renderBreakdownSection(cat, itemsByCategory[cat] || [], byId);
  });

  const today = new Date().toLocaleDateString("en-GB", { day:"2-digit", month:"2-digit", year:"numeric" }).replace(/\//g, "/");
  const generatedAt = new Date().toLocaleDateString("en-GB", { day:"2-digit", month:"short", year:"numeric" }).toUpperCase();

  $("#printView").innerHTML = `
    <div class="print-sheet">
      <div class="print-band pb-title">Bill of Materials</div>
      <table class="print-titleblock-table">
        <tr><td class="pb-lbl">SO #:</td><td class="pb-val">${esc(a.so_number)||""}</td><td class="pb-lbl">REV:</td><td class="pb-val">${esc(a.current_rev)||""}</td></tr>
        <tr><td class="pb-lbl">CODE:</td><td class="pb-val">${esc(a.assembly_number)||""}</td><td class="pb-lbl">DATE:</td><td class="pb-val">${today}</td></tr>
        <tr><td class="pb-lbl">DESCRIPTION:</td><td class="pb-val">${esc(a.description)||esc(a.assembly_name)||""}</td><td class="pb-lbl">DRAWN:</td><td class="pb-val">${esc(a.drawn_by)||""}</td></tr>
        <tr><td class="pb-lbl">CLIENT:</td><td class="pb-val">${esc(a.client)||""}</td><td class="pb-lbl">CHECKED:</td><td class="pb-val">${esc(a.checked_by)||""}</td></tr>
        <tr><td class="pb-lbl">ASSEMBLY NAME:</td><td class="pb-val">${esc(a.assembly_name)||""}</td><td class="pb-lbl">APPROVED:</td><td class="pb-val">${esc(a.approved_by)||""}</td></tr>
      </table>
      ${html}
      <div class="print-footer">
        <span>ATRADA &nbsp;|&nbsp; ${esc(a.assembly_number)} &nbsp;|&nbsp; ${esc(statusLabel(a.status)).toUpperCase()} &nbsp;|&nbsp; Generated: ${generatedAt}</span>
        <span>Generated from Atrada Assembly Builder</span>
      </div>
    </div>
  `;
}

function docKindLabel(k){
  return ({full_assy:"Full Assembly", master_bom:"Master BOM", revision_history:"Revision History",
    standard_parts:"Standard Parts", part_drawing:"Part Drawing", other:"Other"})[k] || "Unclassified";
}

async function handleFiles(fileList){
  const files = Array.from(fileList);
  for (const file of files){
    await processAndUploadFile(file);
  }
  await loadDrawerData();
  renderAttachmentsTab();
}

async function processAndUploadFile(file){
  const progressEl = $("#uploadProgress");
  const ext = file.name.split(".").pop().toLowerCase();
  const fileType = ext === "dxf" ? "dxf" : "pdf";
  progressEl.innerHTML = `<div class="empty-bom">Uploading ${esc(file.name)}...</div>`;

  const storagePath = `${selectedAssembly.assembly_number}/${Date.now()}_${file.name}`;
  const { error: upErr } = await sb.storage.from("assembly-drawings").upload(storagePath, file);
  if (upErr){ toast("Upload failed for " + file.name + ": " + upErr.message, true); return; }

  let docKind = "other";
  let parseStatus = "manual";
  let parseNotes = "";

  if (fileType === "pdf"){
    try {
      const arrayBuf = await file.arrayBuffer();
      const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuf }).promise;
      const pages = await extractPdfPages(pdfDoc);
      const fullText = pages.map(p => p.rawText).join("\n");

      if (/BILL OF MATERIALS/i.test(fullText) && /ORDER SUMMARY|SHEETMETAL|WELDMENTS|FASTENERS/i.test(fullText)){
        docKind = "master_bom";
        const result = parseMasterBom(pages);
        if (result.items.length > 0){
          const applyResult = await applyMasterBomResult(result);
          if (applyResult.error){
            parseStatus = "failed";
            parseNotes = `Parsed ${applyResult.totalCount} items but save failed: ${applyResult.error}`;
          } else {
            parseStatus = "parsed";
            parseNotes = `${applyResult.insertedCount} line items imported`;
          }
        } else {
          parseStatus = "failed";
          parseNotes = "No detail section recognized";
        }
      } else {
        // Full Assembly reference docs and Standard Parts library docs both contain a mix
        // of "ASSEMBLY DRAWING REFERENCE" and "PART DRAWING REFERENCE" pages, AND every page's
        // own title block carries a small "REVISION HISTORY" section with "Drafted" in it --
        // so the old revision_history content check (below) would false-positive on almost any
        // multi-page Atrada drawing before ever reaching this branch. Filename + content checks
        // for full_assy/standard_parts must run FIRST; revision_history is checked only as a
        // fallback, for documents that are genuinely dedicated revision-history sheets.
        const nameNorm = file.name.toUpperCase().replace(/[_\-]+/g, " ");
        const looksFullAssy = /FULL\s*ASS(Y|EMBLY)/.test(nameNorm) || /ASSEMBLY DRAWING REFERENCE/i.test(fullText);
        const looksStandardParts = /STANDARD\s*PARTS?/.test(nameNorm) || /PART DRAWING REFERENCE/i.test(fullText);

        if (looksFullAssy){
          docKind = "full_assy";
          const result = buildFullAssyTree(pages);
          if (result.items.length > 0){
            const applyResult = await applyMasterBomResult(result);
            if (applyResult.error){
              parseStatus = "failed";
              parseNotes = `Parsed ${applyResult.totalCount} items but save failed: ${applyResult.error}`;
            } else {
              parseStatus = "parsed";
              parseNotes = `${applyResult.insertedCount} line items auto-organized from cutting list`;
            }
          } else {
            parseStatus = "manual";
            parseNotes = "No CUTTING LIST & BOM table found - stored for reference";
          }
        } else if (looksStandardParts){
          docKind = "standard_parts";
          const records = parseStandardPartsPages(pages);
          const applyResult = await applyStandardPartsResult(records);
          if (applyResult.error){
            parseStatus = "failed";
            parseNotes = `Parsed ${applyResult.totalCount} parts but save failed: ${applyResult.error}`;
          } else if (applyResult.insertedCount > 0){
            parseStatus = "parsed";
            parseNotes = `${applyResult.insertedCount} standard part(s) imported`;
          } else {
            parseStatus = "manual";
            parseNotes = "No NetSuite codes recognized - stored for reference";
          }
        } else if (/FULL REVISION HISTORY|REVISION HISTORY/i.test(fullText) && /Drafted/i.test(fullText)){
          docKind = "revision_history";
          const result = parseRevisionHistory(pages);
          if (result.length > 0){
            await applyRevisionHistoryResult(result);
            parseStatus = "parsed";
            parseNotes = `${result.length} revisions imported`;
          } else {
            parseStatus = "failed";
            parseNotes = "Could not parse revision rows";
          }
        } else {
          parseStatus = "manual";
          parseNotes = "Unrecognized document - stored for reference";
        }
      }
    } catch (e){
      parseStatus = "failed";
      parseNotes = "Parse error: " + e.message;
    }
  } else {
    parseNotes = "DXF stored for reference (not parsed)";
  }

  const { error: insErr } = await sb.from("attachments").insert({
    assembly_id: selectedAssembly.id, file_name: file.name, file_type: fileType,
    doc_kind: docKind, storage_path: storagePath, parse_status: parseStatus,
    parse_notes: parseNotes, uploaded_by: currentUser.id
  });
  if (insErr){ toast("Failed to record attachment: " + insErr.message, true); return; }
  progressEl.innerHTML = "";
  toast(`${file.name}: ${parseNotes || parseStatus}`);
}

// =====================================================================
// PDF TEXT EXTRACTION (pdf.js -> normalized token rows per page)
// =====================================================================
async function extractPdfPages(pdfDoc){
  const pages = [];
  for (let i = 1; i <= pdfDoc.numPages; i++){
    const page = await pdfDoc.getPage(i);
    const viewport = page.getViewport({ scale: 1 });
    const content = await page.getTextContent();
    const tokens = content.items.map(item => ({
      text: item.str,
      x: item.transform[4],
      x1: item.transform[4] + (item.width || 0), // used by the cutting-list column gap detector
      top: viewport.height - item.transform[5]
    })).filter(t => t.text.trim().length > 0);
    // group into rows by rounded 'top'
    const rowMap = {};
    tokens.forEach(t => {
      const key = Math.round(t.top / 3) * 3; // tolerance grouping
      (rowMap[key] = rowMap[key] || []).push(t);
    });
    const rowKeys = Object.keys(rowMap).map(Number).sort((a,b) => a-b);
    const rows = rowKeys.map(k => {
      const r = rowMap[k].sort((a,b) => a.x - b.x);
      r.rowTop = k;
      return r;
    });
    const rawText = rows.map(r => r.map(t => t.text).join(" ")).join("\n");
    pages.push({ pageNum: i, rows, rawText });
  }
  return pages;
}

// =====================================================================
// MASTER BOM PARSER
// Detail sections are the ones headed by a BARE category name
// (SHEETMETAL / WELDMENTS / FASTENERS & FITTINGS / LABELS & STICKERS).
// Any header containing ORDER SUMMARY / PROCUREMENT / BAR / CUTTING PLAN /
// REMAINING GROUPS is a derived rollup and is skipped.
// =====================================================================
const CATEGORY_MAP = {
  "SHEETMETAL": "sheetmetal",
  "WELDMENTS": "weldment",
  "FASTENERS & FITTINGS": "fastener",
  "LABELS & STICKERS": "label"
};
const SKIP_MARKERS = ["ORDER SUMMARY","PROCUREMENT","BAR","CUTTING PLAN","REMAINING GROUPS","NOTE 1","NOTE 2","NOTE 3","NOTE 4","NOTE 5","NOTE 6"];

function colBucket(x){
  if (x < 50) return "itemNo";
  if (x < 260) return "partName";
  if (x < 528) return "description";
  if (x < 578) return "material";
  if (x < 636) return "length";
  if (x < 670) return "qty";
  if (x < 752) return "netsuite";
  return "remarks";
}

function joinBucket(rowTokens, bucket){
  return rowTokens.filter(t => colBucket(t.x) === bucket).map(t => t.text).join(" ").trim();
}

function extractAssemblyMeta(pages){
  const meta = {};
  const text = pages[0] ? pages[0].rawText : "";
  const grab = (label) => {
    const re = new RegExp(label + "\\s*:?\\s*([^\\n]*)", "i");
    const m = text.match(re);
    return m ? m[1].trim() : null;
  };
  const codeMatch = text.match(/CODE:\s*([A-Z0-9]+)/i);
  if (codeMatch) meta.assembly_number = codeMatch[1].trim();
  const revMatch = text.match(/REV:\s*([0-9]+\s*-?\s*[A-Z]*)/i);
  if (revMatch) meta.current_rev = revMatch[1].replace(/\s+/g," ").trim();
  const descMatch = text.match(/DESCRIPTION:\s*([^\n]*?)\s*DRAWN:/i);
  if (descMatch) meta.assembly_name = descMatch[1].trim();
  const drawnMatch = text.match(/DRAWN:\s*([^\n]*)/i);
  if (drawnMatch) meta.drawn_by = drawnMatch[1].trim();
  const checkedMatch = text.match(/CHECKED:\s*([^\n]*)/i);
  if (checkedMatch) meta.checked_by = checkedMatch[1].trim();
  const approvedMatch = text.match(/APPROVED:\s*([^\n]*)/i);
  if (approvedMatch) meta.approved_by = approvedMatch[1].trim();
  const clientMatch = text.match(/CLIENT:\s*([^\n]*?)\s*CHECKED:/i);
  if (clientMatch && clientMatch[1].trim()) meta.client = clientMatch[1].trim();
  return meta;
}

function parseMasterBom(pages){
  const meta = extractAssemblyMeta(pages);
  const items = []; // flat list: {tempId, parentTempId, node_type, item_no, part_number, description, material, length_mm, qty, netsuite_code, remarks, category, sort_order}
  let mode = "skip";
  let currentCategory = null;
  let currentGroupNode = null;
  let sortCounter = 0;
  let tempIdCounter = 0;

  function newTempId(){ return "tmp" + (tempIdCounter++); }

  pages.forEach(page => {
    let pageHasSkipMarker = false; // reset per page; prevents bare category names that
                                   // appear INSIDE a procurement rollup (e.g. "ORDER SUMMARY -
                                   // REMAINING GROUPS" listing "FASTENERS & FITTINGS" as a plain
                                   // sub-label) from incorrectly re-entering detail mode. True
                                   // detail pages never contain a skip marker before their
                                   // category headers, so this only suppresses the false case.
    page.rows.forEach(row => {
      if (row.length === 0) return;
      const lineText = row.map(t => t.text).join(" ").replace(/\s+/g," ").trim();
      const upper = lineText.toUpperCase();

      // skip boilerplate rows
      if (/^BILL OF MATERIALS$/i.test(lineText)) return;
      if (/^ATRADA\s*\|/i.test(lineText)) return;
      if (/^#\s*SUB-ASSEMBLY/i.test(lineText)) return;
      if (/^(DESCRIPTION|CLIENT|ASSEMBLY NAME|SO\s*#|CODE|DATE)\s*:/i.test(lineText)) return;
      if (/^NOTE\s*\d/i.test(lineText)) return;
      if (/^Generated:/i.test(lineText)) return;

      const firstToken = row[0];
      const isItemRow = /^\d+$/.test(firstToken.text) && firstToken.x < 50;

      if (isItemRow){
        if (mode !== "detail") return; // ignore item rows while in a skip section
        const item_no = firstToken.text;
        const part_number = joinBucket(row, "partName");
        const description = joinBucket(row, "description");
        const material = joinBucket(row, "material");
        const lengthStr = joinBucket(row, "length");
        const qtyStr = joinBucket(row, "qty");
        const netsuite_code = joinBucket(row, "netsuite");
        const remarks = joinBucket(row, "remarks");
        const length_mm = lengthStr ? parseFloat(lengthStr.replace(/[^0-9.]/g,"")) : null;
        const qty = qtyStr ? parseFloat(qtyStr.replace(/[^0-9.]/g,"")) : 1;
        items.push({
          tempId: newTempId(),
          parentTempId: currentGroupNode ? currentGroupNode.tempId : null, // no group header -> root-level item, grouped visually by 'category'
          node_type: "item",
          item_no, part_number, description,
          material: material || null,
          length_mm: (length_mm !== null && !Number.isNaN(length_mm)) ? length_mm : null,
          qty: Number.isNaN(qty) ? 1 : qty,
          netsuite_code: netsuite_code || null,
          remarks: remarks || null,
          category: currentCategory,
          sort_order: sortCounter++
        });
        return;
      }

      // header-type row (not an item row)
      const isBareCategory = Object.prototype.hasOwnProperty.call(CATEGORY_MAP, upper) && !pageHasSkipMarker;
      const isSkipMarker = SKIP_MARKERS.some(m => upper.includes(m));

      if (isSkipMarker){
        mode = "skip";
        pageHasSkipMarker = true;
        return;
      }

      if (isBareCategory){
        // Category is a pure grouping label (rendered as a colored band in the UI),
        // NOT a tree node - it never gets inserted into bom_nodes. Only sub-assembly
        // groups and items are real rows, always at root level or under a group.
        mode = "detail";
        currentCategory = CATEGORY_MAP[upper];
        currentGroupNode = null;
        return;
      }

      // otherwise: sub-assembly / part group header, only meaningful in detail mode
      if (mode === "detail"){
        currentGroupNode = {
          tempId: newTempId(),
          parentTempId: null, // groups are root-level nodes, grouped visually by 'category'
          node_type: "sub_assembly",
          item_no: null, part_number: lineText, description: null,
          material: null, length_mm: null, qty: 1, netsuite_code: null, remarks: null,
          category: currentCategory, sort_order: sortCounter++
        };
        items.push(currentGroupNode);
      }
    });
  });

  return { meta, items };
}

async function applyMasterBomResult(result){
  const { meta, items } = result;

  // Update assembly meta (only fill blanks, don't clobber manual edits silently — but rev/description are authoritative from doc)
  const updateFields = {};
  if (meta.current_rev) updateFields.current_rev = meta.current_rev;
  if (meta.assembly_name) updateFields.assembly_name = meta.assembly_name;
  if (meta.drawn_by) updateFields.drawn_by = meta.drawn_by;
  if (meta.checked_by) updateFields.checked_by = meta.checked_by;
  if (meta.approved_by) updateFields.approved_by = meta.approved_by;
  if (meta.client) updateFields.client = meta.client;
  if (Object.keys(updateFields).length > 0){
    await sb.from("assemblies").update(updateFields).eq("id", selectedAssembly.id);
  }

  // Replace existing bom_nodes for this assembly
  await sb.from("bom_nodes").delete().eq("assembly_id", selectedAssembly.id);

  // Insert nodes level by level, resolving tempId -> real id, since parent_id must reference existing rows
  const tempToReal = {};
  let insertedCount = 0;
  // Build dependency order: nodes whose parentTempId is null first, then resolve iteratively
  const remaining = [...items];
  let guard = 0;
  while (remaining.length > 0 && guard < 20){
    guard++;
    const batch = [];
    for (let i = remaining.length - 1; i >= 0; i--){
      const n = remaining[i];
      if (n.parentTempId === null || tempToReal[n.parentTempId] !== undefined){
        batch.push(n);
        remaining.splice(i, 1);
      }
    }
    if (batch.length === 0) break;
    const insertRows = batch.map(n => ({
      assembly_id: selectedAssembly.id,
      parent_id: n.parentTempId ? tempToReal[n.parentTempId] : null,
      node_type: n.node_type,
      item_no: n.item_no,
      part_number: n.part_number,
      description: n.description,
      material: n.material,
      category: n.category,
      length_mm: n.length_mm,
      qty: n.qty,
      netsuite_code: n.netsuite_code,
      remarks: n.remarks,
      sort_order: n.sort_order
    }));
    const { data, error } = await sb.from("bom_nodes").insert(insertRows).select();
    if (error){ toast("BOM import error: " + error.message, true); return { insertedCount, totalCount: items.length, error: error.message }; }
    data.forEach((row, idx) => { tempToReal[batch[idx].tempId] = row.id; });
    insertedCount += data.length;
  }
  if (remaining.length > 0){
    // Some nodes never resolved a parent - shouldn't happen, but surface it rather than
    // silently reporting success for a partially-imported tree.
    return { insertedCount, totalCount: items.length, error: `${remaining.length} node(s) could not be attached to a parent` };
  }
  return { insertedCount, totalCount: items.length, error: null };
}

// =====================================================================
// FULL ASSEMBLY CUTTING-LIST -> MASTER BOM AUTO-ORGANIZER
// Ported from the validated Python prototype (cutting_list_parser.py /
// build_tree.py). Operates on `pages` from extractPdfPages() -- same
// {rows:[{text,x,x1,top,rowTop}], rawText} shape already used by the
// Master BOM and Revision History parsers.
// =====================================================================

const STOP_RE = /^(EXPLODED|VIEW|CLIENT:|ASSEMBLY|DRAWN:|CHECKED:|APPROVED:|UNLESS|DIMENSIONS|TOLERANCE|GENERAL|ANGLE|SHEET|SCALE:|SCALE|WEIGHT:|DRAWING|REFERENCE)$/i;
const SUB_ASSY_RE = /\bSUB[\s-]?ASSY\b/i;
const REV_RE = /[-–]?\s*REV\.?\s*\d+\b/i;

function detectColumnBoundaries(words, left, right, minGap){
  minGap = minGap || 8;
  const width = Math.floor(right - left) + 3;
  const occupied = new Uint8Array(width);
  words.forEach(w => {
    const x0 = Math.max(left, w.x);
    const x1 = Math.min(right, w.x1);
    const lo = Math.max(0, Math.floor(x0 - left));
    const hi = Math.min(width, Math.floor(x1 - left) + 1);
    for (let x = lo; x < hi; x++) occupied[x] = 1;
  });
  const boundaries = [];
  let start = null;
  for (let i = 0; i < width; i++){
    if (!occupied[i]){
      if (start === null) start = i;
    } else if (start !== null){
      if (i - start >= minGap) boundaries.push(left + (start + i) / 2);
      start = null;
    }
  }
  if (start !== null && width - start >= minGap) boundaries.push(left + (start + width) / 2);
  return boundaries;
}

// Locate the "CUTTING LIST & BOM" table on a single page, if present.
function findCuttingListTable(page){
  const rows = page.rows;
  let titleIdx = -1;
  for (let i = 0; i < rows.length; i++){
    const upper = rows[i].map(w => w.text.toUpperCase()).join(" ");
    // Some sub-assembly detail pages title their cut list "BOM TABLE(RESTRUCTURED)"
    // instead of "CUTTING LIST & BOM" -- these carry the authoritative cut-angle
    // and remarks data for weldments, so they must be recognized too.
    if (upper.includes("CUTTING") || (upper.includes("BOM") && upper.includes("TABLE"))){ titleIdx = i; break; }
  }
  if (titleIdx === -1) return null;

  // pdf.js fuses multi-word labels into single tokens (e.g. "PART NUMBER" as
  // one string), unlike word-level PDF extraction -- so header detection
  // must test substrings, not exact token equality.
  // ANGLE1/ANGLE2/REMARKS are recognized here too so they get their own column
  // instead of being merged ("_extra") into LENGTH/QTY and corrupting those values.
  const HEADER_TOKEN_RE = /\b(ITEM|NO\.?|PART|NUMBER|DESCRIPTION|LENGTH|ANGLE1|ANGLE2|QTY\.?|NETSUITE|CODE|REMARKS)\b/i;
  const headerWords = [];
  let headerBottom = rows[titleIdx].rowTop;
  const HEADER_WINDOW = 6;
  for (let i = titleIdx + 1; i < Math.min(rows.length, titleIdx + 1 + HEADER_WINDOW); i++){
    const matched = rows[i].filter(w => HEADER_TOKEN_RE.test(w.text));
    if (matched.length){
      headerWords.push(...matched);
      headerBottom = Math.max(headerBottom, rows[i].rowTop);
    }
  }
  if (!headerWords.length) return null;

  function labelX(...labels){
    const xs = headerWords.filter(w => labels.some(l => w.text.toUpperCase().includes(l))).map(w => w.x);
    return xs.length ? Math.min(...xs) : null;
  }
  const headerPositions = {
    item_no: labelX("ITEM","NO."),
    part_number: labelX("PART","NUMBER"),
    description: labelX("DESCRIPTION"),
    length_mm: labelX("LENGTH"),
    angle1: labelX("ANGLE1"),
    angle2: labelX("ANGLE2"),
    qty: labelX("QTY."),
    netsuite_code: labelX("NETSUITE","CODE"),
    remarks: labelX("REMARKS")
  };
  Object.keys(headerPositions).forEach(k => { if (headerPositions[k] === null) delete headerPositions[k]; });
  const itemNoX = headerPositions.item_no;
  const xThreshold = itemNoX - 120;

  const dataLines = [];
  let prevBottom = headerBottom;
  for (let i = titleIdx + 1; i < rows.length; i++){
    const row = rows[i];
    if (row.rowTop <= headerBottom) continue;
    const fullText = row.map(w => w.text).join(" ").trim();
    if (STOP_RE.test(fullText)) break;
    const kept = row.filter(w => w.x >= xThreshold);
    if (!kept.length) continue;
    if (row.rowTop - prevBottom > 80) break;
    dataLines.push({ top: row.rowTop, words: kept });
    prevBottom = row.rowTop;
  }
  if (!dataLines.length) return null;

  const regionLeft = xThreshold;
  const allWords = dataLines.flatMap(l => l.words);
  const regionRight = Math.max(...allWords.map(w => w.x1)) + 5;
  const gapBoundaries = detectColumnBoundaries(allWords, regionLeft, regionRight);
  const edges = Array.from(new Set([regionLeft, ...gapBoundaries, regionRight])).sort((a,b) => a-b);
  const segments = [];
  for (let i = 0; i < edges.length - 1; i++) segments.push([edges[i], edges[i+1]]);

  function segmentIndex(x){
    for (let i = 0; i < segments.length; i++){
      if (x >= segments[i][0] - 0.5 && x < segments[i][1] + 0.5) return i;
    }
    return segments.length - 1;
  }
  const segmentNames = {};
  Object.entries(headerPositions).forEach(([name, x]) => { segmentNames[segmentIndex(x)] = name; });
  for (let i = 0; i < segments.length; i++){
    if (!(i in segmentNames)){
      const leftNamed = Object.keys(segmentNames).map(Number).filter(j => j < i);
      const rightNamed = Object.keys(segmentNames).map(Number).filter(j => j > i);
      if (leftNamed.length) segmentNames[i] = segmentNames[Math.max(...leftNamed)] + "_extra";
      else if (rightNamed.length) segmentNames[i] = segmentNames[Math.min(...rightNamed)] + "_extra";
    }
  }

  return { segments, segmentNames, lines: dataLines };
}

function buildRowsFromTable(table){
  const { segments, segmentNames, lines } = table;
  if (!lines.length) return [];

  function bucketOf(x){
    let idx = null;
    for (let i = 0; i < segments.length; i++){
      if (x >= segments[i][0] - 0.5 && x < segments[i][1] + 0.5){ idx = i; break; }
    }
    if (idx === null) idx = segments.length - 1;
    const name = segmentNames[idx] || "unknown";
    return name.replace("_extra", "");
  }

  lines.forEach(ln => {
    const buckets = {};
    ln.words.forEach(w => {
      const b = bucketOf(w.x);
      (buckets[b] = buckets[b] || []).push(w.text);
    });
    ln.buckets = {};
    Object.entries(buckets).forEach(([k,v]) => { ln.buckets[k] = v.join(" "); });
  });

  const anchors = lines.filter(ln => ln.buckets.qty);
  if (!anchors.length) return [];
  const anchorTops = anchors.map(a => a.top);

  const tops = lines.map(l => l.top).sort((a,b) => a-b);
  const diffs = [];
  for (let i = 1; i < tops.length; i++) diffs.push(tops[i]-tops[i-1]);
  diffs.sort((a,b) => a-b);
  const medianGap = diffs.length ? diffs[Math.floor(diffs.length/2)] : 19;
  const LOOKAHEAD = Math.max(10, Math.round(medianGap * 0.65));

  function assignGroup(y){
    let best = -1;
    for (let i = 0; i < anchorTops.length; i++){
      if (anchorTops[i] - LOOKAHEAD <= y) best = i;
    }
    return best;
  }

  const groups = anchors.map(() => []);
  lines.forEach(ln => {
    const anchorIdx = anchors.indexOf(ln);
    const idx = anchorIdx !== -1 ? anchorIdx : assignGroup(ln.top);
    if (idx === -1) return;
    groups[idx].push(ln);
  });

  const rows = [];
  anchors.forEach((anchor, i) => {
    const group = groups[i].slice().sort((a,b) => a.top - b.top);
    const merged = {};
    group.forEach(ln => {
      Object.entries(ln.buckets).forEach(([k,v]) => {
        (merged[k] = merged[k] || []).push(v);
      });
    });
    const row = {};
    Object.entries(merged).forEach(([k,v]) => { row[k] = v.join(" ").trim(); });
    const itemNo = row.item_no || "";
    row.item_no = /^\d+$/.test(itemNo) ? itemNo : null;
    row.qty = (row.qty || "").replace(/X/g, "").trim() || null;
    rows.push(row);
  });
  return rows;
}

// Structural classification only: does this row stand for a group (no
// identity of its own -- no description, no netsuite code) or a real leaf
// part? This is an Assembly-Builder-stage concern and never guesses at
// sheetmetal/weldment/fastener/label category.
function classifyNodeType(row){
  const desc = (row.description || "").trim();
  const netsuite = (row.netsuite_code || "").trim().toUpperCase();
  if (netsuite.endsWith("-SA")) return "sub_assembly";
  if (!desc && !netsuite) return "sub_assembly"; // pure grouping/header row, e.g. "MAIN FRAME - REV.03"
  return "item";
}

// Category classification is a Master-BOM-stage concern: it's computed at
// print/generation time (see renderPrintView), never during Full Assembly
// ingestion, so the BOM Tree tab always shows pure structure.
function classifyCategory(row){
  const desc = (row.description || "").trim().toUpperCase();
  const netsuite = (row.netsuite_code || "").trim().toUpperCase();
  if (desc.startsWith("PL.")) return "sheetmetal";
  if (/^(SHS|RHS|CHS|FLAT BAR)\b/.test(desc)) return "weldment";
  if (netsuite.startsWith("F")) return "fastener";
  if (netsuite.startsWith("ST")) return "label";
  if (netsuite.startsWith("PL")) return "label";
  if (netsuite.startsWith("MP")) return "fastener";
  if (!desc && !netsuite) return "weldment";
  return "other";
}

function normalizeName(text){
  text = text || "";
  text = text.replace(REV_RE, "");
  text = text.replace(SUB_ASSY_RE, "");
  text = text.toUpperCase().replace(/[^A-Z0-9 ]/g, " ");
  return text.replace(/\s+/g, " ").trim();
}

function localNest(rows){
  const nested = [];
  let current = null;
  rows.forEach(r => {
    if (r.item_no !== null){
      current = { row: r, children: [] };
      nested.push(current);
    } else {
      if (!current){
        current = { row: { item_no: null, part_number: "", description: "", qty: null, netsuite_code: "", length_mm: "" }, children: [] };
        nested.push(current);
      }
      current.children.push({ row: r, children: [] });
    }
  });
  return nested;
}

// Matches a candidate page either by its cutting-list table's first-row
// part_number (original method), or by the candidate page's own page-level
// "item: <name>" title-block label (new -- needed for sub-assembly detail
// pages like a "BOM TABLE(RESTRUCTURED)" weldment cut list, whose rows don't
// carry a part_number column at all). Already-claimed pages are skipped so
// resolution keeps looking instead of silently giving up.
function findMatchTable(nodeRow, tables, excludePage, usedPages, pageLabels){
  const netsuite = (nodeRow.netsuite_code || "").toUpperCase();
  const codeKey = netsuite.endsWith("-SA") ? netsuite.slice(0, -3) : null;
  const nameKey = normalizeName(nodeRow.part_number);
  for (const t of tables){
    if (t.page === excludePage || usedPages.has(t.page) || !t.rows.length) continue;
    const firstItem = t.rows.find(r => r.item_no !== null);
    let matched = false;
    if (firstItem){
      if (codeKey && (firstItem.netsuite_code || "").toUpperCase() === codeKey) matched = true;
      if (!matched && nameKey && normalizeName(firstItem.part_number) === nameKey) matched = true;
    }
    if (!matched && nameKey && pageLabels[t.page] && normalizeName(pageLabels[t.page].name) === nameKey) matched = true;
    if (matched) return t;
  }
  return null;
}

// Consumes tokens contiguously from a starting index, stopping as soon as a
// gap between consecutive words is larger than normal word-spacing. Used to
// read title-block label values without swallowing unrelated content (e.g. a
// revision-history row) that happens to land in the same coarse row bucket
// purely by vertical coincidence.
function consumeContiguous(row, startIdx, maxGap){
  maxGap = maxGap || 40;
  const out = [row[startIdx]];
  let prevX1 = row[startIdx].x1;
  for (let i = startIdx + 1; i < row.length; i++){
    const w = row[i];
    if (w.x - prevX1 > maxGap) break;
    out.push(w);
    prevX1 = w.x1;
  }
  return out;
}

// Scans every page for "item: X / q'ty: Y / mat'l: Z" title-block labels.
// A single page can carry more than one such block (several individual part
// drawings stacked on one sheet), so this returns every block found, each
// tagged with the page it came from. This is how sheetmetal and weldment
// material gets identified: by reading each part's own drawing block,
// instead of guessing from the cutting-list row.
function extractPartTitleBlocks(pages){
  const blocks = [];
  pages.forEach(page => {
    page.rows.forEach(row => {
      if (!row.length) return;
      if (!/^item:$/i.test(row[0].text)) return;
      const labelX = row[0].x;
      const name = consumeContiguous(row, 0).map(w => w.text).join(" ").replace(/^item:\s*/i, "").trim();
      if (!name) return;
      const qtyRow = page.rows.find(r => r.length && /^q'?ty:$/i.test(r[0].text) &&
        Math.abs(r[0].x - labelX) < 15 && r.rowTop > row.rowTop && r.rowTop - row.rowTop < 60);
      const matlRow = page.rows.find(r => r.length && /^mat'?l:$/i.test(r[0].text) &&
        Math.abs(r[0].x - labelX) < 15 && r.rowTop > row.rowTop && r.rowTop - row.rowTop < 100);
      const qty = qtyRow ? consumeContiguous(qtyRow, 0).map(w => w.text).join(" ").replace(/^q'?ty:\s*/i, "").trim() : null;
      const material = matlRow ? consumeContiguous(matlRow, 0).map(w => w.text).join(" ").replace(/^mat'?l:\s*/i, "").trim() : null;
      blocks.push({ page: page.pageNum, name, qty, material });
    });
  });
  return blocks;
}

// Parse every CUTTING LIST & BOM table across all pages, nest + recursively
// resolve sub-assemblies, and flatten to the {meta, items} shape
// applyMasterBomResult() already expects.
function buildFullAssyTree(pages){
  const tables = [];
  pages.forEach((page, i) => {
    const t = findCuttingListTable(page);
    if (t){
      const rows = buildRowsFromTable(t);
      tables.push({ page: i + 1, rows });
    }
  });
  if (!tables.length) return { meta: {}, items: [] };

  // Every page's own "item: X / mat'l: Y" title-block feeds a single
  // document-wide material lookup, keyed by normalized part name -- this is
  // how sheetmetal AND weldment material gets identified (from each part's
  // own drawing block), regardless of which page ends up supplying its
  // cutting-list rows.
  const titleBlocks = extractPartTitleBlocks(pages);
  const materialByName = {};
  const pageLabels = {};
  titleBlocks.forEach(b => {
    const key = normalizeName(b.name);
    if (key && b.material) materialByName[key] = b.material;
    if (!pageLabels[b.page]) pageLabels[b.page] = b;
  });

  const rootPage = tables[0].page;
  const byPage = {};
  tables.forEach(t => { byPage[t.page] = t; });
  const usedPages = new Set([rootPage]);

  function expand(node){
    const nodeType = classifyNodeType(node.row);
    node.row._node_type = nodeType;
    // Always look for a more authoritative matching page for sub-assemblies,
    // even when this node already has children nested inline from its own
    // table row (e.g. a weldment's plain bar list) -- a dedicated detail page
    // (e.g. a "BOM TABLE(RESTRUCTURED)" cut-angle list with remarks) is more
    // complete and should replace the inline version when one exists.
    if (nodeType === "sub_assembly"){
      const match = findMatchTable(node.row, tables, rootPage, usedPages, pageLabels);
      if (match){
        usedPages.add(match.page);
        node.children = localNest(match.rows);
        node.row._resolved_from_page = match.page;
      }
    }
    node.children.forEach(expand);
  }

  const rootNested = localNest(byPage[rootPage].rows);
  rootNested.forEach(expand);

  const items = [];
  let tempCounter = 0;
  function flatten(nested, parentTempId){
    nested.forEach((node, i) => {
      const row = node.row;
      tempCounter++;
      const tempId = "tmp" + tempCounter;
      const materialKey = normalizeName(row.part_number);
      items.push({
        tempId,
        parentTempId: parentTempId,
        node_type: row._node_type || "item",
        item_no: row.item_no || null,
        part_number: row.part_number || null,
        description: row.description || null,
        material: materialByName[materialKey] || null,
        category: null,
        length_mm: row.length_mm ? parseFloat(row.length_mm) : null,
        qty: row.qty ? parseFloat(row.qty) : 1,
        netsuite_code: row.netsuite_code || null,
        remarks: row.remarks || null,
        sort_order: i
      });
      flatten(node.children, tempId);
    });
  }
  flatten(rootNested, null);

  return { meta: {}, items };
}

// =====================================================================
// STANDARD PARTS PARSER
// =====================================================================
// pdf.js can fuse "item: <value>" into a single token, unlike word-level
// PDF extraction where the label and its value are separate tokens -- so
// detect the label as a PREFIX of the first token, not the whole token.
const SP_LABEL_PREFIX_RE = /^(item|q'?ty|mat'?l):\s*/i;
const SP_STOP_LABELS = new Set(["CLIENT:","ASSEMBLY","NUMBER:","DRAWN:","SHEET","SCALE:","WEIGHT:","NAME:","CHECKED:","APPROVED:","UNLESS","DIMENSIONS","TOLERANCE","GENERAL","ANGLE","IN"]);

function parseStandardPartsPage(page, pageNum){
  const rows = page.rows;
  const fields = {};
  let currentLabel = null;
  rows.forEach(row => {
    if (!row.length) return;
    const firstTok = row[0];
    const m = firstTok.text.match(SP_LABEL_PREFIX_RE);
    if (m){
      currentLabel = m[1].toLowerCase().replace(/'/g, "");
      const restOfFirst = firstTok.text.slice(m[0].length);
      const restTokens = row.slice(1).map(w => w.text);
      fields[currentLabel] = [restOfFirst, ...restTokens].join(" ").trim();
    } else if (currentLabel && firstTok.x < 900 && !SP_STOP_LABELS.has(firstTok.text.toUpperCase())){
      fields[currentLabel] += " " + row.map(w => w.text).join(" ");
    } else if (SP_STOP_LABELS.has(firstTok.text.toUpperCase()) || firstTok.x >= 900){
      currentLabel = null;
    }
  });

  let netsuiteCode = null;
  for (let i = 0; i < rows.length; i++){
    const matchTok = rows[i].find(w => /ASSEMBLY/i.test(w.text) && /NUMBER/i.test(w.text));
    const hasAssembly = rows[i].some(w => /ASSEMBLY/i.test(w.text));
    const hasNumber = rows[i].some(w => /NUMBER/i.test(w.text));
    if (matchTok || (hasAssembly && hasNumber)){
      const labelTok = matchTok || rows[i].find(w => /ASSEMBLY/i.test(w.text) || /NUMBER/i.test(w.text));
      const labelX1 = labelTok.x1;
      for (let j = i + 1; j < Math.min(rows.length, i + 5); j++){
        const candidates = rows[j].filter(w => w.x > labelX1 - 50 && w.x < labelX1 + 350 && /^[A-Z]{1,3}\d{3,}(-SA)?$/.test(w.text.trim()));
        if (candidates.length){ netsuiteCode = candidates[0].text.trim(); break; }
      }
      break;
    }
  }

  return {
    page: pageNum,
    netsuite_code: netsuiteCode,
    part_number: netsuiteCode,
    description: fields.item || null,
    qty_note: fields.qty || null,
    material: fields.matl || null,
    category: null,
    drawing_ref: "HDSB003 STANDARD PARTS p" + pageNum,
    weight_kg: null
  };
}

function parseStandardPartsPages(pages){
  return pages.map((p, i) => parseStandardPartsPage(p, i + 1));
}

async function applyStandardPartsResult(records){
  const rows = records.filter(r => r.netsuite_code).map(r => ({
    netsuite_code: r.netsuite_code,
    part_number: r.part_number,
    description: r.description,
    material: r.material,
    category: r.category,
    drawing_ref: r.drawing_ref,
    weight_kg: r.weight_kg
  }));
  if (rows.length === 0) return { insertedCount: 0, totalCount: records.length, error: null };
  const { data, error } = await sb.from("standard_parts").upsert(rows, { onConflict: "netsuite_code" }).select();
  if (error) return { insertedCount: 0, totalCount: records.length, error: error.message };
  return { insertedCount: data.length, totalCount: records.length, error: null };
}

// =====================================================================
// REVISION HISTORY PARSER
// =====================================================================
function revColBucket(x){
  if (x < 62) return "rev";
  if (x < 130) return "draftedBy";
  if (x < 200) return "draftedDate";
  if (x < 262) return "checkedBy";
  if (x < 400) return "checkDate";
  if (x < 578) return "partRevised";
  if (x < 945) return "details";
  return "reason";
}
function joinRevBucket(rowTokens, bucket){
  return rowTokens.filter(t => revColBucket(t.x) === bucket).map(t => t.text).join(" ").trim();
}

function parseRevisionHistory(pages){
  const LOOKAHEAD = 12; // pt tolerance: a tall "Details" cell's first line can render
                        // slightly ABOVE its own row's Rev# marker line, since short
                        // cells in that row appear bottom-aligned while multi-line
                        // cells start-align at the row's top. Verified against the
                        // real TMSB201 revision history PDF.
  const rowsInOrder = [];
  pages.forEach(page => {
    page.rows.forEach(row => {
      if (row.length === 0) return;
      const lineText = row.map(t => t.text).join(" ").trim();
      if (/^Rev\.?:?\s*#/i.test(lineText)) return;
      if (/^FULL REVISION HISTORY$/i.test(lineText)) return;
      if (/^(SO\s*#|CODE|CLIENT|ASSEMBLY NAME|DESCRIPTION)\s*:/i.test(lineText)) return;
      if (/^\d+$/.test(lineText.trim()) && row.length === 1) return;
      rowsInOrder.push(row);
    });
  });

  const isMarkerRow = (row) => /^\d+$/.test(row[0].text) && row[0].x < 62;
  const markers = rowsInOrder.filter(isMarkerRow);
  const markerTops = markers.map(r => r.rowTop);

  function assignGroupIndex(y){
    let best = -1;
    for (let i = 0; i < markerTops.length; i++){
      if (markerTops[i] - LOOKAHEAD <= y) best = i;
    }
    return best;
  }

  const groups = markers.map(() => []);
  rowsInOrder.forEach(row => {
    const markerIdx = markers.indexOf(row);
    const groupIdx = markerIdx !== -1 ? markerIdx : assignGroupIndex(row.rowTop);
    if (groupIdx === -1) return;
    groups[groupIdx].push(row);
  });

  const revisionsOut = markers.map((markerRow, i) => {
    const rows = [...groups[i]].sort((a,b) => a.rowTop - b.rowTop);
    const rev_number = markerRow[0].text;
    const drafted_by = joinRevBucket(markerRow, "draftedBy").replace(/^-$/,"") || null;
    const date_raw = joinRevBucket(markerRow, "draftedDate").replace(/^-$/,"") || null;
    const checked_by = joinRevBucket(markerRow, "checkedBy").replace(/^-$/,"") || null;
    const part_number = rows.map(r => joinRevBucket(r, "partRevised")).filter(Boolean).join(" ").trim();
    const details = rows.map(r => joinRevBucket(r, "details")).filter(Boolean).join(" ").trim();
    return {
      rev_number,
      part_number: part_number || null,
      details,
      date_approved: parseDateLoose(date_raw),
      drafted_by,
      checked_by,
      approved_by: null
    };
  });

  return revisionsOut.filter(r => r.details && r.details.trim().length > 0);
}

function parseDateLoose(s){
  if (!s) return null;
  const months = {jan:"01",feb:"02",mar:"03",apr:"04",may:"05",jun:"06",jul:"07",aug:"08",sep:"09",oct:"10",nov:"11",dec:"12"};
  const m = s.match(/(\d{1,2})[-\s]([A-Za-z]{3,})[-\s](\d{4})/);
  if (m){
    const mon = months[m[2].toLowerCase().slice(0,3)];
    if (mon) return `${m[3]}-${mon}-${m[1].padStart(2,"0")}`;
  }
  return null;
}

async function applyRevisionHistoryResult(parsedRevisions){
  // Replace existing revisions for this assembly with freshly parsed ones
  await sb.from("revisions").delete().eq("assembly_id", selectedAssembly.id);
  const rows = parsedRevisions.map(r => ({
    assembly_id: selectedAssembly.id,
    part_number: r.part_number,
    rev_number: r.rev_number,
    details: r.details,
    date_approved: r.date_approved,
    drafted_by: r.drafted_by,
    checked_by: r.checked_by,
    approved_by: r.approved_by
  }));
  if (rows.length > 0){
    const { error } = await sb.from("revisions").insert(rows);
    if (error){ toast("Revision import error: " + error.message, true); }
  }
}

// =====================================================================
// INIT
// =====================================================================
initAuth();
</script>
